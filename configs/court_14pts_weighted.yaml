# court_14pts_weighted.yaml
path: ./Court_Finetune_Workspace/dataset_v2 # 指向你刚生成的 v2 数据集
train: train/images
val: val/images

names:
  0: tennis_court

kpt_shape: [14, 3]

# 🌟 核心魔法：自定义关键点权重 (Sigmas)
# 数组顺序对应你的 1-14 号点
# 前 4 个角点给定极小的 sigma (0.015)，让它们在 Loss 中占据绝对统治地位
# 后 10 个辅助点给定较大的 sigma (0.085)，允许它们有一定误差，仅作辅助
sigmas: [
  0.015, 0.015, 0.015, 0.015,   # 1-4: 四大底角 (高权重)
  0.085, 0.085,                 # 5-6: 底线中点 (低权重)
  0.085, 0.085, 0.085,          # 7-9: 远端发球线 (低权重)
  0.085, 0.085, 0.085,          # 10-12: 近端发球线 (低权重)
  0.085, 0.085                  # 13-14: 网柱 (低权重)
]