# 最优配置 — 全量数据训练（带图像增强）
# 基于 optimal.yaml，改用 data/rallies_train 全量数据
# 用法: python src/model/mst/train.py --config configs/optimal_full.yaml
# data_root: "data/rallies_train"
# test_data_root: (无) — 自动从 data_root 按 train_ratio 划分
# seq_len: 120
# min_seq_len: 60
# reshuffle_augment: true
# image_augment: true
# train_ratio: 0.8
# num_classes: 5
# class_weights: [0.9, 4.0, 5.0, 4.0, 1.5]

data_root: "data/rallies_train"
crops_root: "data/rallies_train"
seq_len: 120
min_seq_len: 60
reshuffle_augment: true
image_augment: true
train_ratio: 0.8
num_classes: 5
class_weights: [0.9, 4.0, 5.0, 4.0, 1.5]

# ── 模型架构 ──
use_visual: true
use_player_crops: true
use_pose: true
use_pos_encoding: false
visual_backbone: "yolo11"
global_backbone_weights: "models/yolo/yolo11n.pt"
backbone_weights: "models/yolo/yolo11n-pose.pt"
unfreeze_backbone: true
multi_scale_levels: [3, 4, 5]
tokens_per_scale: 4
visual_tokens: 16
merge_visual_tokens: true
parallel_backbones: false

# ── 模型超参 ──
embed_dim: 128
depth: 4
num_heads: 2
dropout: 0.3

# ── 训练 ──
batch_size: 2
virtual_batch_size: 64
total_epochs: 100
learning_rate: 1.0e-4
weight_decay: 0.05
warmup_epochs: 5
loss: "cross_entropy"
keyframe_loss_weight: 0.5

# ── 硬件 ──
num_workers: 4
pin_memory: true
transformer_checkpoint: true
