# 消融实验：仅全帧视觉（去掉 pose + 裁剪图，保留全帧视觉流）
# 介于 abl_no_pose 和 abl_no_visual 之间，量化裁剪图+姿态的联合贡献

data_root: "data/rallies_train"
crops_root: "data/rallies_train"
seq_len: 120
min_seq_len: 60
reshuffle_augment: true
train_ratio: 0.8
num_classes: 5
class_weights: [1.0, 4.0, 5.0, 4.0, 1.5]

use_visual: true
use_player_crops: false          # ← 变量：无裁剪图
use_pose: false                  # ← 变量：无姿态
use_pos_encoding: false
visual_backbone: "yolo11"
global_backbone_weights: "models/yolo/yolo11n.pt"
backbone_weights: "models/yolo/yolo11n-pose.pt"
unfreeze_backbone: true
multi_scale_levels: [3, 4, 5]
tokens_per_scale: 4
visual_tokens: 16
merge_visual_tokens: true
parallel_backbones: false

embed_dim: 128
depth: 8
num_heads: 4
dropout: 0.3

batch_size: 4                    # 无裁剪图显存压力小，batch 可适当调大
virtual_batch_size: 64
total_epochs: 40
learning_rate: 1.0e-4
weight_decay: 0.05
warmup_epochs: 5
loss: "focal"
focal_gamma: 2.0
keyframe_loss_weight: 0.5

num_workers: 2
pin_memory: true
transformer_checkpoint: true
